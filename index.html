<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIRAL PRIME - تيك توك الأسطوري</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff0050;
      --secondary: #00f7ef;
      --tertiary: #ffd700;
      --dark: #0a0e27;
      --darker: #050812;
      --card: rgba(15, 25, 55, 0.6);
      --border: rgba(0, 247, 239, 0.12);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
      color: var(--text);
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .app {
      display: grid;
      grid-template-columns: 70px 1fr 320px;
      height: 100vh;
      gap: 10px;
      padding: 10px;
      position: relative;
      z-index: 2;
    }

    .sidebar-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
    }

    .logo-btn {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 16px;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
    }

    .logo-btn:hover {
      transform: scale(1.1) rotate(-5deg);
    }

    .nav-item {
      width: 55px;
      height: 55px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      color: var(--text-dim);
    }

    .nav-item:hover {
      background: rgba(0, 247, 239, 0.08);
      border-color: var(--secondary);
      color: var(--secondary);
      transform: translateY(-3px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), rgba(255, 0, 80, 0.5));
      border-color: var(--primary);
      color: var(--text);
    }

    #feed {
      position: relative;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px;
    }

    #feed::-webkit-scrollbar { display: none; }

    .video-post {
      height: 100%;
      min-height: 650px;
      scroll-snap-align: start;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .video-player {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .video-player video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }

    .controls-right {
      position: absolute;
      right: 16px;
      bottom: 100px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ctrl-btn {
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
    }

    .ctrl-btn:hover {
      background: rgba(255, 0, 80, 0.6);
      transform: scale(1.1);
    }

    .ctrl-btn.active {
      background: var(--primary);
      box-shadow: 0 0 20px rgba(255, 0, 80, 0.5);
    }

    .video-info {
      padding: 20px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.95) 100%);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .creator-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      justify-content: space-between;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      border: 2px solid var(--secondary);
      flex-shrink: 0;
    }

    .creator-info {
      flex: 1;
    }

    .creator-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .creator-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .follow-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .follow-btn:hover {
      transform: translateY(-2px);
    }

    .follow-btn.followed {
      background: rgba(255, 255, 255, 0.2);
      color: var(--secondary);
    }

    .video-title {
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bottom-actions {
      display: flex;
      justify-content: space-around;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 12px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.8rem;
      transition: all 0.25s;
      flex: 1;
    }

    .action-btn:hover {
      color: var(--secondary);
    }

    .action-icon {
      font-size: 1.3rem;
    }

    .action-btn.liked .action-icon {
      color: var(--primary);
      animation: heartBeat 0.4s;
    }

    @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

    .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 8px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      outline: none;
      font-size: 0.9rem;
      font-family: 'Cairo', sans-serif;
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.25s;
      font-family: 'Cairo', sans-serif;
    }

    .filter-btn:hover {
      border-color: var(--secondary);
      background: rgba(0, 247, 239, 0.08);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--primary), rgba(255, 0, 80, 0.5));
      border-color: var(--primary);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 900;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .trending-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .trending-item {
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
      transition: all 0.25s;
    }

    .trending-item:hover {
      background: rgba(0, 247, 239, 0.08);
      transform: translateX(-4px);
    }

    .trending-tag {
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 3px;
      font-size: 0.9rem;
    }

    .trending-count {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .no-videos {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      text-align: center;
      color: var(--text-dim);
    }

    @media (max-width: 1024px) {
      .app { grid-template-columns: 65px 1fr 0; }
      .sidebar-right { display: none; }
    }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; padding: 0; gap: 0; }
      .sidebar-left { display: none; }
      .video-post { border-radius: 0; min-height: 100vh; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="loading">
  <div class="spinner"></div>
  <div style="color: var(--secondary); font-weight: 900; letter-spacing: 2px;">VIRAL PRIME</div>
</div>

<div class="app">

  <div class="sidebar-left">
    <button class="logo-btn" onclick="location.reload()">🎥</button>
    <div class="nav-item active" onclick="switchNav(event, 'all')">🏠</div>
    <div class="nav-item" onclick="switchNav(event, 'trending')">🔥</div>
    <div class="nav-item" onclick="switchNav(event, 'music')">🎵</div>
    <div class="nav-item" onclick="switchNav(event, 'comedy')">😂</div>
  </div>

  <div id="feed"></div>

  <div class="sidebar-right">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث..." onkeyup="searchVideos(this.value)">
    </div>

    <div class="filters">
      <div class="filter-btn active" onclick="filterCategory(event, 'all')">الكل</div>
      <div class="filter-btn" onclick="filterCategory(event, 'music')">🎵 موسيقى</div>
      <div class="filter-btn" onclick="filterCategory(event, 'comedy')">😂 فكاهة</div>
      <div class="filter-btn" onclick="filterCategory(event, 'trending')">🔥 مشهور</div>
    </div>

    <div class="card">
      <div class="card-title">🔥 الآن</div>
      <div class="trending-list" id="trending"></div>
    </div>

    <div class="card">
      <div class="card-title">📊 الإحصائيات</div>
      <div style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.8;">
        <div>📹 الفيديوهات: <span style="color: var(--secondary);" id="total">0</span></div>
        <div>❤️ الإعجابات: <span style="color: var(--primary);" id="likes">0</span></div>
        <div>⏱️ المشاهدة: <span style="color: var(--tertiary);" id="time">0 ث</span></div>
        <div>👥 المتابعون: <span style="color: var(--secondary);" id="followers">0</span></div>
      </div>
    </div>
  </div>

</div>

<script>
// ===== VIDEOS DATABASE =====
const VIDEOS = [
  {
    id: 1,
    title: "منظر طبيعي ساحر - شروق الشمس على الجبال 🏔️",
    channel: "Nature Films",
    category: "trending",
    url: "https://videos.pexels.com/video-files/3571937/3571937-sd_640_360_30fps.mp4"
  },
  {
    id: 2,
    title: "موسيقى هادئة مع طبيعة خضراء 🌿",
    channel: "Chill Vibes",
    category: "music",
    url: "https://videos.pexels.com/video-files/3217788/3217788-sd_640_360_30fps.mp4"
  },
  {
    id: 3,
    title: "حيوانات ظريفة تلعب - فيديو مضحك 😂",
    channel: "Funny Pets",
    category: "comedy",
    url: "https://videos.pexels.com/video-files/5573881/5573881-sd_640_360_30fps.mp4"
  },
  {
    id: 4,
    title: "محيط هادئ وموجات جميلة 🌊",
    channel: "Ocean Dreams",
    category: "trending",
    url: "https://videos.pexels.com/video-files/7991196/7991196-sd_640_360_25fps.mp4"
  },
  {
    id: 5,
    title: "غابة ضبابية - مناظر طبيعية خلابة 🌲",
    channel: "Wild Nature",
    category: "trending",
    url: "https://videos.pexels.com/video-files/2398220/2398220-sd_640_360_30fps.mp4"
  },
  {
    id: 6,
    title: "قطط لطيفة تلعب - محتوى طريف 😹",
    channel: "Cat Lovers",
    category: "comedy",
    url: "https://videos.pexels.com/video-files/2603537/2603537-sd_640_360_30fps.mp4"
  }
];

// ===== STATE =====
let currentLikes = {};
let stats = { likes: 0, watchTime: 0, followers: 0, totalLikes: 0 };
let currentCategory = 'all';
let currentPlayingVideo = null;
let watchTimers = {};
let followed = {};

window.addEventListener('load', () => {
  initCanvas();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('total').textContent = VIDEOS.length;
    renderFeed();
    updateTrending();
  }, 1000);
});

function initCanvas() {
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let particles = [];

  for(let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      a: Math.random() * 0.5
    });
  }

  function draw() {
    ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.a += 0.01;
      if(p.x < 0) p.x = canvas.width;
      if(p.x > canvas.width) p.x = 0;
      if(p.y < 0) p.y = canvas.height;
      if(p.y > canvas.height) p.y = 0;

      const alpha = 0.3 + 0.2 * Math.sin(p.a);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 247, 239, ${alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  const filtered = currentCategory === 'all' 
    ? VIDEOS 
    : VIDEOS.filter(v => v.category === currentCategory);

  if(filtered.length === 0) {
    feed.innerHTML = '<div class="no-videos"><div style="font-size: 3rem;">📭</div>لا توجد فيديوهات</div>';
    return;
  }

  filtered.forEach(video => {
    const post = document.createElement('div');
    post.className = 'video-post';
    const liked = currentLikes[video.id] || false;
    const isMuted = localStorage.getItem('soundOff') === 'true';

    post.innerHTML = `
      <div class="video-player">
        <video 
          id="vid-${video.id}" 
          autoplay 
          muted
          loop
          playsinline
          onplay="startWatchTimer(${video.id})" 
          onpause="stopWatchTimer(${video.id})"
          onended="stopWatchTimer(${video.id})">
          <source src="${video.url}" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <div class="controls-right">
          <div style="text-align: center;">
            <div class="ctrl-btn ${liked ? 'active' : ''}" onclick="toggleLike(${video.id}, this)">❤️</div>
            <div style="font-size: 0.65rem; color: white; margin-top: 4px;">إعجاب</div>
          </div>
          <div style="text-align: center;">
            <div class="ctrl-btn" onclick="shareVideo('${video.title}')">📤</div>
            <div style="font-size: 0.65rem; color: white; margin-top: 4px;">شارك</div>
          </div>
          <div style="text-align: center;">
            <div class="ctrl-btn" onclick="bookmarkVideo(this)">🔖</div>
            <div style="font-size: 0.65rem; color: white; margin-top: 4px;">حفظ</div>
          </div>
          <div style="text-align: center;">
            <div class="ctrl-btn ${isMuted ? 'active' : ''}" onclick="toggleSound(this)">🔊</div>
            <div style="font-size: 0.65rem; color: white; margin-top: 4px;">صوت</div>
          </div>
        </div>
      </div>

      <div class="video-info">
        <div class="creator-section">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="avatar">${video.channel.charAt(0)}</div>
            <div class="creator-info">
              <div class="creator-name">${video.channel}</div>
              <div class="creator-meta">عضو في المنصة</div>
            </div>
          </div>
          <button class="follow-btn ${followed[video.id] ? 'followed' : ''}" onclick="followChannel(${video.id}, this)">
            ${followed[video.id] ? '✓ متابع' : 'متابعة'}
          </button>
        </div>

        <div class="video-title">${video.title}</div>

        <div class="bottom-actions">
          <div class="action-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${video.id}, this)">
            <div class="action-icon">❤️</div>
            <span>إعجاب</span>
          </div>
          <div class="action-btn" onclick="comment()">
            <div class="action-icon">💬</div>
            <span>تعليق</span>
          </div>
          <div class="action-btn" onclick="shareVideo('${video.title}')">
            <div class="action-icon">📤</div>
            <span>شارك</span>
          </div>
        </div>
      </div>
    `;

    feed.appendChild(post);
  });

  setupObserver();
}

function setupObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('video');
      if(!video) return;
      
      if(entry.isIntersecting) {
        if(currentPlayingVideo && currentPlayingVideo !== video) {
          currentPlayingVideo.pause();
          currentPlayingVideo.currentTime = 0;
        }
        currentPlayingVideo = video;
        video.play().catch(() => {});
      } else {
        if(video === currentPlayingVideo) {
          video.pause();
          video.currentTime = 0;
          currentPlayingVideo = null;
        }
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.video-post').forEach(p => observer.observe(p));
}

// ===== WATCH TIME (CORRECT) =====
function startWatchTimer(id) {
  if(watchTimers[id]) return;
  
  watchTimers[id] = setInterval(() => {
    stats.watchTime++;
    document.getElementById('time').textContent = stats.watchTime + ' ث';
  }, 1000);
}

function stopWatchTimer(id) {
  if(watchTimers[id]) {
    clearInterval(watchTimers[id]);
    delete watchTimers[id];
  }
}

// ===== LIKE (FIXED) =====
function toggleLike(id, el) {
  const wasLiked = currentLikes[id];
  
  if(wasLiked) {
    // Unlike
    delete currentLikes[id];
    stats.likes--;
    stats.totalLikes--;
    if(el.classList) el.classList.remove('active');
    else el.closest('.action-btn').classList.remove('liked');
  } else {
    // Like
    currentLikes[id] = true;
    stats.likes++;
    stats.totalLikes++;
    if(el.classList) el.classList.add('active');
    else el.closest('.action-btn').classList.add('liked');
  }
  
  document.getElementById('likes').textContent = stats.totalLikes;
  notify(wasLiked ? '💔 تم الإلغاء' : '❤️ تم الإعجاب!');
}

// ===== SOUND CONTROL =====
function toggleSound(btn) {
  const isMuted = localStorage.getItem('soundOff') === 'true';
  
  if(isMuted) {
    localStorage.removeItem('soundOff');
    btn.classList.remove('active');
    document.querySelectorAll('video').forEach(v => v.muted = false);
    notify('🔊 الصوت مفعّل');
  } else {
    localStorage.setItem('soundOff', 'true');
    btn.classList.add('active');
    document.querySelectorAll('video').forEach(v => v.muted = true);
    notify('🔇 الصوت معطّل');
  }
}

// ===== OTHER ACTIONS =====
function comment() { notify('💬 أضف تعليقك!'); }

function shareVideo(title) { 
  if(navigator.share) navigator.share({text: title});
  else {
    navigator.clipboard.writeText(title);
    notify('📤 تم النسخ!');
  }
}

function bookmarkVideo(el) { 
  el.classList.toggle('active');
  notify('🔖');
}

function followChannel(id, btn) {
  followed[id] = !followed[id];
  
  if(followed[id]) {
    btn.textContent = '✓ متابع';
    btn.classList.add('followed');
    stats.followers++;
    document.getElementById('followers').textContent = stats.followers;
    notify('✓ تمت المتابعة!');
  } else {
    btn.textContent = 'متابعة';
    btn.classList.remove('followed');
    stats.followers--;
    document.getElementById('followers').textContent = stats.followers;
    notify('💔 تم إلغاء المتابعة');
  }
}

// ===== NAVIGATION =====
function switchNav(e, cat) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  e.target.classList.add('active');
  currentCategory = cat;
  document.getElementById('searchInput').value = '';
  renderFeed();
}

function filterCategory(e, cat) {
  document.querySelectorAll('.filter-btn').forEach(f => f.classList.remove('active'));
  e.target.classList.add('active');
  currentCategory = cat;
  document.getElementById('searchInput').value = '';
  renderFeed();
}

// ===== SMART SEARCH (CASE INSENSITIVE) =====
function searchVideos(q) {
  if(q.length < 1) { 
    document.getElementById('searchInput').value = '';
    renderFeed(); 
    return; 
  }
  
  const feed = document.getElementById('feed');
  const query = q.toLowerCase().trim();
  
  const filtered = VIDEOS.filter(v => 
    v.title.toLowerCase().includes(query) || 
    v.channel.toLowerCase().includes(query) ||
    v.category.toLowerCase().includes(query)
  );
  
  if(!filtered.length) {
    feed.innerHTML = '<div class="no-videos"><div style="font-size: 3rem;">🔍</div>لا توجد نتائج</div>';
    return;
  }

  feed.innerHTML = '';
  filtered.forEach(v => {
    const div = document.createElement('div');
    div.innerHTML = `<div style="padding: 10px; background: var(--card); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); font-weight: 700;">${v.title}</div>`;
    div.onclick = () => { 
      currentCategory = v.category; 
      document.getElementById('searchInput').value = '';
      renderFeed(); 
    };
    feed.appendChild(div);
  });
}

function updateTrending() {
  const trending = [
    { tag: '#فيديوهات_حصرية', count: '450K' },
    { tag: '#محتوى_طازج', count: '320K' },
    { tag: '#أكثر_مشاهدة', count: '680K' }
  ];

  document.getElementById('trending').innerHTML = trending.map(t => `
    <div class="trending-item">
      <div class="trending-tag">${t.tag}</div>
      <div class="trending-count">${t.count} مشاهدة</div>
    </div>
  `).join('');
}

function notify(emoji) {
  const n = document.createElement('div');
  n.style.cssText = `position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 12px 20px; border-radius: 12px; z-index: 5000; animation: slideIn 0.3s ease; font-weight: 700;`;
  n.textContent = emoji;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 1500);
}

const style = document.createElement('style');
style.textContent = '@keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }';
document.head.appendChild(style);
</script>
