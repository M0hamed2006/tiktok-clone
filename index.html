<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎥 VIRAL PRIME - أفضل منصة فيديوهات</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff0050;
      --secondary: #00f7ef;
      --tertiary: #ffd700;
      --dark: #0a0e27;
      --darker: #050812;
      --card: rgba(20, 30, 60, 0.5);
      --border: rgba(0, 247, 239, 0.1);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.4);
      --glow-primary: 0 0 25px rgba(255, 0, 80, 0.35);
      --glow-secondary: 0 0 25px rgba(0, 247, 239, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
      color: var(--text);
    }

    /* ===== BG ===== */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== LOADING ===== */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .loader-dot {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.4s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
      background: var(--secondary);
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
      background: var(--tertiary);
    }

    @keyframes bounce {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .loader-text {
      color: var(--secondary);
      font-weight: 900;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-grid {
      display: grid;
      grid-template-columns: 70px 1fr 300px;
      height: 100vh;
      gap: 8px;
      padding: 8px;
      position: relative;
      z-index: 2;
    }

    /* ===== SIDEBAR LEFT ===== */
    .sidebar-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: var(--glow-primary);
    }

    .logo:hover {
      transform: scale(1.1) rotate(-5deg);
    }

    .nav-btn {
      width: 55px;
      height: 55px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.25s;
      color: var(--text-dim);
    }

    .nav-btn:hover {
      background: rgba(0, 247, 239, 0.08);
      border-color: var(--secondary);
      color: var(--secondary);
      transform: translateY(-3px);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, var(--primary), rgba(255, 0, 80, 0.5));
      border-color: var(--primary);
      color: var(--text);
      box-shadow: var(--glow-primary);
    }

    /* ===== FEED ===== */
    #feed {
      position: relative;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px;
    }

    #feed::-webkit-scrollbar {
      display: none;
    }

    .video-item {
      height: 100%;
      min-height: 620px;
      scroll-snap-align: start;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .video-player {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-player video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
    }

    .video-controls {
      position: absolute;
      right: 15px;
      bottom: 80px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-btn {
      width: 50px;
      height: 50px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .control-btn:hover {
      background: rgba(255, 0, 80, 0.7);
      transform: scale(1.1);
    }

    .control-btn.active {
      background: var(--primary);
      box-shadow: var(--glow-primary);
    }

    .video-info {
      padding: 20px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 100%);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      justify-content: space-between;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      border: 2px solid var(--secondary);
    }

    .channel-info {
      flex: 1;
    }

    .channel-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .channel-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .follow-btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.25s;
    }

    .follow-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow-primary);
    }

    .video-desc {
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .engagement-row {
      display: flex;
      justify-content: space-around;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .engage-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.8rem;
      transition: all 0.25s;
      flex: 1;
      padding: 8px;
    }

    .engage-btn:hover {
      color: var(--secondary);
    }

    .engage-icon {
      font-size: 1.3rem;
    }

    .engage-btn.active .engage-icon {
      color: var(--primary);
      animation: pulse 0.4s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== SIDEBAR RIGHT ===== */
    .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 8px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
    }

    .search-box:focus-within {
      border-color: var(--secondary);
      box-shadow: var(--glow-secondary);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      outline: none;
      font-size: 0.9rem;
      font-family: 'Cairo', sans-serif;
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .source-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .source-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      font-family: 'Cairo', sans-serif;
    }

    .source-btn:hover {
      border-color: var(--secondary);
      background: rgba(0, 247, 239, 0.08);
    }

    .source-btn.active {
      background: linear-gradient(135deg, var(--primary), rgba(255, 0, 80, 0.5));
      border-color: var(--primary);
      color: var(--text);
      box-shadow: var(--glow-primary);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 900;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .trending-item {
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.02);
    }

    .trending-item:hover {
      background: rgba(0, 247, 239, 0.08);
      transform: translateX(-4px);
    }

    .trending-tag {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--secondary);
      margin-bottom: 3px;
    }

    .trending-count {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* ===== MODAL ===== */
    #sourceModal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    #sourceModal.hidden {
      display: none;
    }

    .modal-box {
      background: linear-gradient(135deg, var(--dark), rgba(20, 30, 60, 0.8));
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 60px rgba(255, 0, 80, 0.2);
      text-align: center;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sources-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    .source-option {
      background: var(--card);
      border: 1.5px solid var(--border);
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .source-option:hover {
      border-color: var(--secondary);
      background: rgba(0, 247, 239, 0.1);
      transform: translateY(-3px);
    }

    .source-label {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 700;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 65px 1fr 0;
      }
      .sidebar-right {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
        padding: 0;
        gap: 0;
      }
      .sidebar-left {
        display: none;
      }
      .video-item {
        border-radius: 0;
        margin-bottom: 0;
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LOADING -->
<div id="loading">
  <div class="loader-dot">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="loader-text">VIRAL PRIME</div>
</div>

<!-- SOURCE MODAL -->
<div id="sourceModal">
  <div class="modal-box">
    <div class="modal-title">اختار مصدر الفيديوهات</div>
    <div class="sources-grid">
      <div class="source-option" onclick="selectSource('tiktok')">
        <div>🎵</div>
        <div class="source-label">TikTok</div>
      </div>
      <div class="source-option" onclick="selectSource('youtube')">
        <div>📺</div>
        <div class="source-label">YouTube</div>
      </div>
      <div class="source-option" onclick="selectSource('facebook')">
        <div>👍</div>
        <div class="source-label">Facebook</div>
      </div>
      <div class="source-option" onclick="selectSource('instagram')">
        <div>📸</div>
        <div class="source-label">Instagram</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-grid">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar-left">
    <div class="logo" onclick="location.reload()">🎥</div>
    <div class="nav-btn active" onclick="switchNav(event, 'home')">🏠</div>
    <div class="nav-btn" onclick="switchNav(event, 'trending')">🔥</div>
    <div class="nav-btn" onclick="switchNav(event, 'music')">🎵</div>
    <div class="nav-btn" onclick="switchNav(event, 'comedy')">😂</div>
    <div class="nav-btn" onclick="switchNav(event, 'gaming')">🎮</div>
  </div>

  <!-- FEED CENTER -->
  <div id="feed"></div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar-right">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="ابحث..." onkeyup="searchVideos(this.value)">
    </div>

    <div>
      <div style="font-size: 0.8rem; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;">المصدر</div>
      <div class="source-selector">
        <div class="source-btn active" onclick="changeSource('tiktok', event)">🎵 TikTok</div>
        <div class="source-btn" onclick="changeSource('youtube', event)">📺 YouTube</div>
        <div class="source-btn" onclick="changeSource('facebook', event)">👍 Facebook</div>
        <div class="source-btn" onclick="changeSource('instagram', event)">📸 Instagram</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔥 الأكثر مشاهدة</div>
      <div id="trending"></div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ خيارات</div>
      <div style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.5;">
        <div style="padding: 8px; margin-bottom: 8px; background: rgba(0,247,239,0.05); border-radius: 8px; cursor: pointer;" onclick="toggleAutoplay()">▶️ تشغيل تلقائي</div>
        <div style="padding: 8px; background: rgba(0,247,239,0.05); border-radius: 8px; cursor: pointer;" onclick="toggleSound()">🔊 الصوت</div>
      </div>
    </div>
  </div>

</div>

<script>
// ===== CONFIG =====
const VIDEOS_DATA = [
  // TikTok Videos (embed codes)
  { id: 1, source: 'tiktok', title: 'فيديو تيك توك رائع', channel: 'Creator 1', avatar: 'C', link: 'https://www.tiktok.com/@creator1/video/1234567890' },
  { id: 2, source: 'youtube', title: 'فيديو يوتيوب مميز', channel: 'Creator 2', avatar: 'C', videoId: 'dQw4w9WgXcQ' },
  { id: 3, source: 'tiktok', title: 'فيديو تيك توك مضحك', channel: 'Creator 3', avatar: 'C', link: 'https://www.tiktok.com/@creator3/video/1234567891' },
  { id: 4, source: 'facebook', title: 'فيديو فيس بوك جميل', channel: 'Creator 4', avatar: 'C', fbLink: 'https://www.facebook.com/watch/?v=1234567890' },
  { id: 5, source: 'instagram', title: 'فيديو إنستجرام رايق', channel: 'Creator 5', avatar: 'C', igLink: 'https://www.instagram.com/reel/ABC123/' },
  { id: 6, source: 'youtube', title: 'فيديو يوتيوب آخر', channel: 'Creator 6', avatar: 'C', videoId: 'jNQXAC9IVRw' },
  { id: 7, source: 'tiktok', title: 'فيديو تيك توك موسيقي', channel: 'Creator 7', avatar: 'C', link: 'https://www.tiktok.com/@creator7/video/1234567892' },
  { id: 8, source: 'youtube', title: 'فيديو يوتيوب تعليمي', channel: 'Creator 8', avatar: 'C', videoId: '9bZkp7q19f0' },
];

// ===== STATE =====
let currentSource = 'tiktok';
let currentIndex = 0;
let filteredVideos = VIDEOS_DATA.filter(v => v.source === 'tiktok');
let autoplay = true;
let soundOn = true;
let currentAudio = null;

// ===== INIT =====
window.addEventListener('load', () => {
  initCanvas();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    loadFeed();
    updateTrending();
  }, 800);
});

// ===== CANVAS BG =====
function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for(let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random() * 0.5
    });
  }

  function draw() {
    ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
    ctx.fillRect(0, 0, w, h);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.a += 0.01;

      if(p.x < 0) p.x = w;
      if(p.x > w) p.x = 0;
      if(p.y < 0) p.y = h;
      if(p.y > h) p.y = 0;

      const alpha = 0.3 + 0.2 * Math.abs(Math.sin(p.a));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 247, 239, ${alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
}

// ===== LOAD FEED =====
function loadFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  filteredVideos.forEach((video, idx) => {
    const item = document.createElement('div');
    item.className = 'video-item';
    
    let playerHTML = '';
    if(video.source === 'youtube' && video.videoId) {
      playerHTML = `<iframe src="https://www.youtube.com/embed/${video.videoId}?modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    } else if(video.source === 'tiktok') {
      playerHTML = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; flex-direction: column; color: #fff; gap: 15px;">
        <div style="font-size: 3rem;">🎵</div>
        <div style="text-align: center;">
          <div style="font-size: 1.1rem; font-weight: 700; margin-bottom: 10px;">فيديو TikTok</div>
          <div style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 15px;">اضغط للفتح على TikTok</div>
          <a href="${video.link}" target="_blank" style="background: linear-gradient(135deg, #ff0050, #ff006e); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 700; display: inline-block;">فتح الفيديو</a>
        </div>
      </div>`;
    } else if(video.source === 'facebook') {
      playerHTML = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; flex-direction: column; color: #fff; gap: 15px;">
        <div style="font-size: 3rem;">👍</div>
        <div style="text-align: center;">
          <div style="font-size: 1.1rem; font-weight: 700; margin-bottom: 10px;">فيديو Facebook</div>
          <div style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 15px;">اضغط للفتح على Facebook</div>
          <a href="${video.fbLink}" target="_blank" style="background: #1877f2; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 700; display: inline-block;">فتح الفيديو</a>
        </div>
      </div>`;
    } else if(video.source === 'instagram') {
      playerHTML = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; flex-direction: column; color: #fff; gap: 15px;">
        <div style="font-size: 3rem;">📸</div>
        <div style="text-align: center;">
          <div style="font-size: 1.1rem; font-weight: 700; margin-bottom: 10px;">فيديو Instagram</div>
          <div style="font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 15px;">اضغط للفتح على Instagram</div>
          <a href="${video.igLink}" target="_blank" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 700; display: inline-block;">فتح الفيديو</a>
        </div>
      </div>`;
    }

    item.innerHTML = `
      <div class="video-player">
        ${playerHTML}
        <div class="video-overlay"></div>
        <div class="video-controls">
          <button class="control-btn" onclick="toggleLike(this)">❤️</button>
          <button class="control-btn" onclick="shareVideo('${video.title}')">📤</button>
          <button class="control-btn" onclick="bookmarkVideo(this)">🔖</button>
          <button class="control-btn" onclick="toggleMute(this)">🔊</button>
        </div>
        <div class="video-info">
          <div class="channel-row">
            <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
              <div class="avatar">${video.avatar}</div>
              <div class="channel-info">
                <div class="channel-name">${video.channel}</div>
                <div class="channel-meta">المزيد من الفيديوهات</div>
              </div>
            </div>
            <button class="follow-btn" onclick="follow(this)">متابعة</button>
          </div>
          <div class="video-desc">${video.title}</div>
          <div class="engagement-row">
            <div class="engage-btn" onclick="engage(this, 'like')"><div class="engage-icon">❤️</div><span>إعجاب</span></div>
            <div class="engage-btn" onclick="engage(this, 'comment')"><div class="engage-icon">💬</div><span>تعليق</span></div>
            <div class="engage-btn" onclick="engage(this, 'share')"><div class="engage-icon">📤</div><span>شارك</span></div>
          </div>
        </div>
      </div>
    `;

    feed.appendChild(item);
  });

  // IntersectionObserver for audio control
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const video = entry.target.querySelector('iframe');
      if(entry.isIntersecting) {
        // Video is in view - could enable audio
      } else {
        // Video is out of view - stop all audio
        if(currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.video-item').forEach(item => {
    observer.observe(item);
  });
}

// ===== INTERACTIONS =====
function engage(el, type) {
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 400);
}

function toggleLike(btn) {
  btn.classList.toggle('active');
}

function toggleMute(btn) {
  btn.classList.toggle('active');
  soundOn = !soundOn;
}

function shareVideo(title) {
  const text = `شاهد هذا الفيديو الرائع: ${title}\n\n🎥 VIRAL PRIME\nhttps://viralprime.com`;
  if(navigator.share) {
    navigator.share({title: 'VIRAL PRIME', text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text);
    alert('تم نسخ الفيديو!');
  }
}

function bookmarkVideo(btn) {
  btn.classList.toggle('active');
}

function follow(btn) {
  btn.textContent = '✓ متابع';
  btn.style.opacity = '0.6';
  setTimeout(() => {
    btn.textContent = 'متابعة';
    btn.style.opacity = '1';
  }, 2000);
}

// ===== SOURCE CONTROL =====
function changeSource(source, event) {
  document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentSource = source;
  filteredVideos = VIDEOS_DATA.filter(v => v.source === source);
  currentIndex = 0;
  loadFeed();
  updateTrending();
}

function selectSource(source) {
  currentSource = source;
  filteredVideos = VIDEOS_DATA.filter(v => v.source === source);
  document.getElementById('sourceModal').classList.add('hidden');
  loadFeed();
}

// ===== SEARCH =====
function searchVideos(query) {
  if(query.length < 2) {
    filteredVideos = VIDEOS_DATA.filter(v => v.source === currentSource);
  } else {
    filteredVideos = VIDEOS_DATA.filter(v => 
      v.source === currentSource && 
      (v.title.includes(query) || v.channel.includes(query))
    );
  }
  loadFeed();
}

// ===== NAVIGATION =====
function switchNav(event, type) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // Filter by category
  loadFeed();
}

// ===== TRENDING =====
function updateTrending() {
  const trending = [
    { tag: '#فيديوهات_حصرية', count: '450K' },
    { tag: '#محتوى_طازج', count: '320K' },
    { tag: '#أكثر_مشاهدة', count: '680K' },
    { tag: '#فيديو_اليوم', count: '250K' },
  ];

  const trendingDiv = document.getElementById('trending');
  trendingDiv.innerHTML = trending.map(t => `
    <div class="trending-item" onclick="searchVideos('${t.tag}')">
      <div class="trending-tag">${t.tag}</div>
      <div class="trending-count">${t.count} مشاهدة</div>
    </div>
  `).join('');
}

// ===== OPTIONS =====
function toggleAutoplay() {
  autoplay = !autoplay;
  alert(autoplay ? '▶️ التشغيل التلقائي مفعّل' : '⏸️ التشغيل التلقائي معطّل');
}

function toggleSound() {
  soundOn = !soundOn;
  alert(soundOn ? '🔊 الصوت مفعّل' : '🔇 الصوت معطّل');
}
</script>
